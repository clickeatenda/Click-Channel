name: Build iOS App

on:
  workflow_dispatch: {}

jobs:
  build:
    name: Build iOS Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update
        shell: bash

      - name: Build for iOS (No Signing)
        run: flutter build ios --release --no-codesign

      - name: Tar output
        run: tar -czf build.tar.gz build/ios/iphoneos

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-app
          path: build.tar.gz
